name: Deploy Docs

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libomp-dev

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Build documentation
        run: uv run nox -s docs

      - name: Deploy documentation
        # `mkdocs` lives in the `docs` dependency group, which the light default
        # sync (default-groups = ["dev"]) does not install, so run with that group
        # to make it resolvable in ./.venv (the `dev` group it pulls in alongside
        # also builds the rclib extension that mkdocstrings imports for the API docs).
        run: uv run --group docs mkdocs gh-deploy --force --clean --verbose
        env:
          GH_TOKEN: ${{ github.token }}

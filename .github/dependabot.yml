version: 2
updates:
  # GitHub Actions used by the workflows in .github/workflows/.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions:
        patterns: ["*"]

  # Vendored C++ dependencies (Eigen, Catch2, pybind11) under cpp_core/third_party.
  - package-ecosystem: "gitsubmodule"
    directory: "/"
    schedule:
      interval: "weekly"

  # Python dependencies resolved in uv.lock / pyproject.toml.
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      python:
        patterns: ["*"]
